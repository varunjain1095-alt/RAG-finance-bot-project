services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_bot
    ports:
      - "5433:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.50.26
    container_name: rag_bot_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rag_pgdata:
  metabase_data:
